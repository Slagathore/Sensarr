name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the deps the test suite actually imports — the full
      # requirements.txt includes Windows-only/GUI packages. This list is the
      # third-party import closure of the test modules (bot/request_flow pull in
      # telegram, plex_control pulls psutil, subtitles pulls subliminal, and so
      # on). If a test fails here on ModuleNotFoundError, recompute the closure
      # instead of adding one module at a time.
      - run: pip install pytest python-dotenv rapidfuzz rank-torrent-name==1.11.1 python-telegram-bot==22.5 psutil==7.0.0 ollama send2trash subliminal babelfish
      - run: python -m pytest tests -q
